name: Build And Push Studio Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Whether to also publish the latest tag"
        required: false
        default: "false"
      image_repository:
        description: "Override image repository path, for example dip/dip-studio"
        required: false
        default: "dip/dip-studio"

env:
  REGISTRY: swr.cn-east-3.myhuaweicloud.com
  IMAGE_NAMESPACE: kweaver-ai
  IMAGE_REPOSITORY: dip/dip-studio

jobs:
  docker:
    runs-on: ubuntu-latest
    concurrency:
      group: studio-image-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    env:
      IMAGE_REPOSITORY: ${{ inputs.image_repository || 'dip/dip-studio' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test

      - name: Build Application
        run: npm run build

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Release Context
        id: prepare
        run: |
          IMAGE_NAME="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_REPOSITORY}"
          SHOULD_PUBLISH_LATEST="false"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION_TAG="${GITHUB_REF_NAME#v}"
            CHART_TAG="${VERSION_TAG}"
          else
            TIMESTAMP="$(date -u +%Y%m%d%H%M)"
            SAFE_REF="${GITHUB_REF_NAME//\//-}"
            SHORT_SHA="$(git rev-parse --short HEAD)"
            CHART_TAG="${SAFE_REF}-${TIMESTAMP}-${SHORT_SHA}"
          fi

          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ] || [ "${{ inputs.push_latest }}" = "true" ]; then
            SHOULD_PUBLISH_LATEST="true"
          fi

          echo "name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "chart_tag=${CHART_TAG}" >> "${GITHUB_OUTPUT}"
          echo "publish_latest=${SHOULD_PUBLISH_LATEST}" >> "${GITHUB_OUTPUT}"

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prepare.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=${{ steps.prepare.outputs.chart_tag }}
            type=raw,value=latest,enable=${{ steps.prepare.outputs.publish_latest == 'true' }}

      - name: Log In To Huawei SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HUAWEI_SWR_USERNAME }}
          password: ${{ secrets.HUAWEI_SWR_PASSWORD }}

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Helm Chart Image Tag
        if: github.ref_type == 'tag'
        run: |
          sed -i 's|^\([[:space:]]*tag:[[:space:]]*\).*|\1"${{ steps.prepare.outputs.chart_tag }}"|' chart/values.yaml

      - name: Commit Helm Chart Tag
        if: github.ref_type == 'tag'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(chart): sync studio image tag to ${{ steps.prepare.outputs.chart_tag }}"
          file_pattern: chart/values.yaml
