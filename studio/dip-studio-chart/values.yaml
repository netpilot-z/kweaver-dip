namespace: anyshare

labels:
  deployment:
    name: dip-studio
  pod:
    app: dip-studio
  service:
    app: dip-studio

name: dip-studio-deployment
replicaCount: 1

image:
  studio:
    registry: acr.aishu.cn
    repository: dip/studio
    tag: "1.0.0-develop"
    pullPolicy: IfNotPresent

service:
  name: dip-studio
  type: ClusterIP
  port: 3100
  targetPort: 3100

ingress:
  enabled: true
  className: class-443
  path: /api/dip-studio
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"

studio:
  nodeEnv: production
  port: 3100
  oauthMockUserId: local-user
  gatewayToken: local-dev-token
  gatewayProtocol: ws
  gatewayHost: 127.0.0.1
  gatewayPort: 19001
  gatewayTimeoutMs: 5000
  configPath: /data/openclaw/config/openclaw.json
  workspaceDir: /data/openclaw/workspace
  bknBackendUrl: http://127.0.0.1:13014
  hydraAdminUrl: http://hydra-admin:4445

resources:
  studio:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

persistence:
  workspace:
    enabled: true
    hostPath: /root/.openclaw/workspace
    mountPath: /data/openclaw/workspace
  config:
    enabled: true
    hostPath: /root/.openclaw/openclaw.json
    mountPath: /data/openclaw/config/openclaw.json

nodeSelector: {}
affinity: {}
tolerations: []
