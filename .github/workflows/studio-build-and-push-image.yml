name: Build And Push Studio Image

on:
  push:
    branches:
      - main
      - master
      - codex/**
    tags:
      - "v*"
    paths:
      - "studio/**"
      - ".github/workflows/studio-build-and-push-image.yml"
  workflow_dispatch:
    inputs:
      image_repository:
        description: "Override image repository path, for example dip/dip-studio"
        required: false
        default: "dip/dip-studio"
      push_latest:
        description: "Whether to also publish the latest tag"
        required: false
        default: "false"

env:
  REGISTRY: swr.cn-east-3.myhuaweicloud.com
  IMAGE_NAMESPACE: kweaver-ai

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REPOSITORY: ${{ inputs.image_repository || 'dip/dip-studio' }}
    defaults:
      run:
        working-directory: studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: studio/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npx vitest run

      - name: Build Application
        run: npm run build

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Image Metadata
        id: prepare
        run: |
          IMAGE_NAME="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_REPOSITORY}"
          SHOULD_PUSH_LATEST="false"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION_TAG="${GITHUB_REF_NAME#v}"
            RELEASE_TAG="${VERSION_TAG}"
          else
            BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
            SHORT_SHA="$(git rev-parse --short HEAD)"
            RELEASE_TAG="${BRANCH_NAME}-${SHORT_SHA}"
          fi

          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ] || [ "${{ inputs.push_latest }}" = "true" ]; then
            SHOULD_PUSH_LATEST="true"
          fi

          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "push_latest=${SHOULD_PUSH_LATEST}" >> "${GITHUB_OUTPUT}"

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prepare.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.prepare.outputs.release_tag }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ steps.prepare.outputs.push_latest == 'true' }}

      - name: Log In To Huawei SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HUAWEI_SWR_USERNAME }}
          password: ${{ secrets.HUAWEI_SWR_PASSWORD }}

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./studio
          file: ./studio/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
